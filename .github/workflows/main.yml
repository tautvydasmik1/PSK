name: CI (tests + smoke)

on: [push, pull_request]

jobs:
  test-and-smoke:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup JDK
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '21'
          cache: 'maven'

      - name: Run unit tests (JUnit + JaCoCo)
        run: mvn -B -q -DskipTests=false test

      - name: Package app
        run: mvn -B -q -DskipTests package

      - name: Start app
        run: |
          nohup java -jar target/*.jar > app.log 2>&1 &
          echo $! > app.pid
          # wait for port 8080 to accept connections (up to ~60s)
          for i in {1..60}; do
            code=$(curl -s -o /dev/null -w "%{http_code}" http://localhost:8080/ || true)
            if [ "$code" != "000" ]; then
              echo "App is responding (HTTP $code)"; break
            fi
            echo "Waiting for app... ($i)"
            sleep 1
          done

      - name: Install jq (for JSON parsing)
        run: sudo apt-get update && sudo apt-get install -y jq

      - name: Smoke 1/3 — login-smoke expects 200 + token
        run: |
          set -e
          HTTP_CODE=$(curl -s -o response.json -w "%{http_code}" \
            -H "Content-Type: application/json" \
            -d '{"username":"user1","password":"pass1"}' \
            http://localhost:8080/api/auth/login-smoke)
          echo "Login HTTP code: $HTTP_CODE"
          [ "$HTTP_CODE" = "200" ]
          TOKEN=$(jq -r '.token // empty' response.json)
          # fallback if your endpoint returns dummy token without JSON field differences
          if [ -z "$TOKEN" ]; then TOKEN="dummy-jwt-token"; fi
          echo "TOKEN=$TOKEN" >> $GITHUB_ENV

      - name: Smoke 2/3 — reservations expects 201
        run: |
          set -e
          HTTP_CODE=$(curl -s -o /dev/null -w "%{http_code}" \
            -H "Authorization: Bearer $TOKEN" \
            -H "Content-Type: application/json" \
            -d '{"bookId":1,"until":"2025-10-10"}' \
            http://localhost:8080/api/smoke/reservations)
          echo "Reservations HTTP code: $HTTP_CODE"
          [ "$HTTP_CODE" = "201" ]

      - name: Smoke 3/3 — comments expects 201
        run: |
          set -e
          HTTP_CODE=$(curl -s -o /dev/null -w "%{http_code}" \
            -H "Authorization: Bearer $TOKEN" \
            -H "Content-Type: application/json" \
            -d '{"bookId":1,"text":"Puiki!"}' \
            http://localhost:8080/api/smoke/comments)
          echo "Comments HTTP code: $HTTP_CODE"
          [ "$HTTP_CODE" = "201" ]

      - name: Stop app
        if: always()
        run: |
          if [ -f app.pid ]; then kill "$(cat app.pid)" || true; fi

      - name: Upload logs (for debugging)
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: ci-logs
          path: |
            app.log
            response.json
