name: tests
on: [push, pull_request]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '21'
      - name: Run unit tests (with JaCoCo)
        run: mvn -B -q -DskipTests=false test
      # (nebūtina) SonarQube, jei turi serverį ir tokeną:
      # - name: SonarQube scan
      #   run: mvn sonar:sonar -Dsonar.host.url=${{ secrets.SONAR_HOST }} -Dsonar.login=${{ secrets.SONAR_TOKEN }}
